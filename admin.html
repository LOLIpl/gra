<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Panel Administracyjny - FifaMoja</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0b0f1a;--card:#131a2b;--border:#1e2a45;--text:#eef2ff;--muted:#7a8aaa;--primary:#2563eb;--primary-light:#60a5fa;--accent-cyan:#06b6d4;--green:#10b981;--red:#ef4444;--yellow:#fbbf24;--fs:15px}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:var(--fs);line-height:1.5;min-height:100vh}
a{color:var(--primary-light);text-decoration:none}
nav{background:rgba(10,14,28,.95);backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,.06);padding:.7rem 1.25rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;position:sticky;top:0;z-index:100}
nav .brand{font-weight:900;font-size:1.1rem;color:#fff}
nav a{color:var(--muted);font-weight:700;font-size:.88rem;padding:.4rem .8rem;border-radius:8px;transition:.15s}
nav a:hover{color:#fff;background:rgba(255,255,255,.06)}
nav a.active{color:#fff;background:var(--primary)}
.container{max-width:1400px;margin:0 auto;padding:1.25rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.25rem;margin-bottom:1rem;box-shadow:0 6px 20px rgba(0,0,0,.3)}
.card h2{font-size:1.2rem;margin-bottom:.8rem;color:#fff}
.card h3{font-size:1rem;margin-bottom:.6rem;color:var(--primary-light)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}
.flex{display:flex;gap:.6rem;flex-wrap:wrap;align-items:center}
.flex-between{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem}
.badge{display:inline-block;padding:.2rem .5rem;border-radius:5px;font-size:.72rem;font-weight:700;white-space:nowrap}
.badge-t1{background:rgba(251,191,36,.15);color:#fbbf24}
.badge-t2{background:rgba(96,165,250,.15);color:#60a5fa}
.badge-t3{background:rgba(16,185,129,.15);color:#10b981}
.badge-t4{background:rgba(156,163,175,.15);color:#9ca3af}
.badge-l1{background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.2)}
.badge-l2{background:rgba(96,165,250,.1);color:#60a5fa;border:1px solid rgba(96,165,250,.2)}
.badge-l3{background:rgba(16,185,129,.1);color:#10b981;border:1px solid rgba(16,185,129,.2)}
.badge-l4{background:rgba(156,163,175,.1);color:#9ca3af;border:1px solid rgba(156,163,175,.2)}
.badge-sm{padding:.15rem .4rem;font-size:.65rem}
.badge-red{background:rgba(239,68,68,.15);color:#ef4444}
table{width:100%;border-collapse:collapse;font-size:.88rem}
th{text-align:left;color:var(--muted);font-size:.72rem;text-transform:uppercase;padding:.6rem .4rem;border-bottom:1px solid var(--border);font-weight:700}
td{padding:.5rem .4rem;border-bottom:1px solid rgba(255,255,255,.03);vertical-align:middle}
tr:hover td{background:rgba(37,99,235,.05)}
tr.clickable{cursor:pointer}
tr.clickable:hover td{background:rgba(37,99,235,.1)}
input,select,textarea{background:#0b0f1a;border:1px solid var(--border);color:#fff;border-radius:6px;padding:.45rem .6rem;font-size:.85rem;width:100%}
input:focus,select:focus,textarea:focus{outline:2px solid var(--primary);border-color:transparent}
input.ovr{width:60px;text-align:center;font-weight:800;font-size:.95rem}
input.sm{width:80px}
.btn{background:var(--primary);color:#fff;border:none;border-radius:8px;padding:.55rem 1rem;font-weight:700;font-size:.85rem;cursor:pointer;transition:.15s;min-height:38px;display:inline-flex;align-items:center;gap:.4rem}
.btn:hover{filter:brightness(1.2)}
.btn-sm{padding:.35rem .7rem;font-size:.78rem;min-height:30px}
.btn-green{background:var(--green)}
.btn-red{background:var(--red)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-ghost:hover{background:rgba(255,255,255,.05);color:#fff}
.tier-row{display:flex;align-items:center;gap:.6rem}
.search-box{max-width:320px;margin-bottom:.8rem}
.stat-chip{display:inline-flex;align-items:center;gap:.25rem;padding:.2rem .5rem;border-radius:5px;font-weight:700;font-size:.78rem}
.stat-chip.good{background:rgba(16,185,129,.12);color:#10b981}
.stat-chip.mid{background:rgba(251,191,36,.12);color:#fbbf24}
.stat-chip.bad{background:rgba(239,68,68,.12);color:#ef4444}
.empty-state{padding:2rem;text-align:center;color:var(--muted);font-size:.92rem}
.hidden{display:none!important}
.sidebar-layout{display:grid;grid-template-columns:300px 1fr;gap:1.25rem;align-items:start}
.sidebar-layout .sidebar{position:sticky;top:80px}
@media(max-width:800px){.sidebar-layout{grid-template-columns:1fr}.sidebar-layout .sidebar{position:static}}
@media(max-width:600px){
  nav{padding:.4rem .6rem;gap:.4rem;}
  nav .brand{font-size:.95rem;}
  nav a{font-size:.78rem;padding:.3rem .5rem;}
  .container{padding:.6rem;}
  .card{padding:.8rem;}
  .grid-2,.grid-3{grid-template-columns:1fr;}
  .form-inline{grid-template-columns:1fr;}
  table{font-size:.78rem;}
  th,td{padding:.3rem .2rem;}
  input.ovr{width:50px;}
  .search-box{max-width:100%;}
}
@media(max-width:480px){
  nav a{font-size:.7rem;padding:.2rem .4rem;}
  .card{padding:.6rem;}
  .card h2{font-size:1rem;}
  .card h3{font-size:.85rem;}
  .btn{font-size:.78rem;padding:.35rem .6rem;min-height:32px;}
  .tier-row{flex-wrap:wrap;}
  .modal-window{padding:1rem;}
}
.pos-badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:.7rem;font-weight:800;background:rgba(255,255,255,.08);color:var(--muted)}
.pos-brd{background:rgba(245,158,11,.15);color:#f59e0b}
.pos-ob{background:rgba(59,130,246,.15);color:#60a5fa}
.pos-po{background:rgba(16,185,129,.15);color:#10b981}
.pos-na{background:rgba(239,68,68,.15);color:#ef4444}
.toast{position:fixed;bottom:20px;right:20px;background:var(--green);color:#fff;padding:.7rem 1.2rem;border-radius:10px;font-weight:700;font-size:.88rem;box-shadow:0 4px 16px rgba(0,0,0,.5);z-index:999;transition:opacity .3s}
.toast.error{background:var(--red)}
.progress-bar{width:100%;height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;margin:.5rem 0}
.progress-bar .fill{height:100%;background:var(--primary);border-radius:2px;transition:width .3s}
.form-inline{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:.6rem}
.form-inline label{font-size:.75rem;color:var(--muted);font-weight:700;display:block;margin-bottom:.2rem}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:1000}
.modal.active{display:flex}
.modal-window{width:92%;max-width:500px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.5rem}
</style>
</head>
<body>
<nav>
  <div class="brand">⚙ Panel Admin</div>
  <a href="/" target="_blank">Gra</a>
  <a href="#" class="active" onclick="showTab('dashboard')">Dashboard</a>
  <a href="#" onclick="showTab('leagues')">Ligi</a>
  <a href="#" onclick="showTab('config')">Konfiguracja</a>
  <a href="#" onclick="showTab('bulk')">Akcje masowe</a>
  <span style="flex:1"></span>
  <span style="color:var(--muted);font-size:.78rem" id="statusBadge">⏳</span>
</nav>
<div class="container">
  <div id="tab-dashboard" class="tab-content"></div>
  <div id="tab-leagues" class="tab-content hidden"></div>
  <div id="tab-config" class="tab-content hidden"></div>
  <div id="tab-bulk" class="tab-content hidden"></div>
</div>
<div id="toast-area"></div>
<div class="modal" id="confirmModal"><div class="modal-window" id="confirmContent"></div></div>

<script>
// === STATE ===
let state = { leagues: null, players: null, config: null, selectedLeague: null, selectedClub: null };
let leagueCache = {};

// === API ===
async function api(path, opts={}) {
  const res = await fetch(path, {
    headers: {'Content-Type':'application/json'},
    ...opts
  });
  const text = await res.text();
  if (!res.ok) throw new Error(`HTTP ${res.status}: ${text}`);
  return JSON.parse(text);
}

function toast(msg, isError=false) {
  const el = document.createElement('div');
  el.className = 'toast' + (isError ? ' error' : '');
  el.textContent = msg;
  document.getElementById('toast-area').appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 2500);
}

function confirmDialog(msg, onConfirm) {
  const el = document.getElementById('confirmContent');
  el.innerHTML = `
    <h3 style="margin-bottom:.8rem">Potwierdzenie</h3>
    <p style="color:var(--muted);margin-bottom:1.5rem">${msg}</p>
    <div class="flex" style="justify-content:end">
      <button class="btn btn-ghost" onclick="closeConfirm()">Anuluj</button>
      <button class="btn btn-red" id="confirmBtn">Tak, usuń</button>
    </div>`;
  document.getElementById('confirmModal').classList.add('active');
  document.getElementById('confirmBtn').onclick = () => { closeConfirm(); onConfirm(); };
}
function closeConfirm() { document.getElementById('confirmModal').classList.remove('active'); }

// === TABS ===
function showTab(name) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
  const el = document.getElementById('tab-' + name);
  if (el) el.classList.remove('hidden');
  document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
  const link = [...document.querySelectorAll('nav a')].find(a => a.textContent.trim().toLowerCase().includes(name));
  if (link) link.classList.add('active');
  if (name === 'dashboard') renderDashboard();
  if (name === 'leagues') { state.selectedLeague = null; state.selectedClub = null; renderLeagueList(); }
  if (name === 'config') renderConfig();
  if (name === 'bulk') renderBulk();
}

// === DASHBOARD ===
async function renderDashboard() {
  const el = document.getElementById('tab-dashboard');
  try {
    const [leaguesData, config] = await Promise.all([
      api('/api/admin/leagues'),
      api('/api/admin/config')
    ]);
    state.leagues = leaguesData.leagues;
    state.config = config;
    const totalClubs = state.leagues.reduce((s, l) => s + l.club_count, 0);
    const ratingStats = await api('/api/admin/rating-stats');
    const tiers = {1:0,2:0,3:0,4:0};
    state.leagues.forEach(l => { if (l.tier) tiers[l.tier]++; });
    el.innerHTML = `
      <div class="grid-3" style="margin-bottom:1.25rem">
        <div class="card" style="text-align:center"><h2 style="font-size:2rem;margin:0">${state.leagues.length}</h2><div style="color:var(--muted)">Ligi</div></div>
        <div class="card" style="text-align:center"><h2 style="font-size:2rem;margin:0">${totalClubs}</h2><div style="color:var(--muted)">Kluby</div></div>
        <div class="card" style="text-align:center"><h2 style="font-size:2rem;margin:0">${ratingStats.total_players}</h2><div style="color:var(--muted)">Piłkarze</div></div>
      </div>
      <div class="grid-2" style="margin-bottom:1.25rem">
        <div class="card"><h2>Ligi według tierów</h2>${[1,2,3,4].map(t => `<div class="flex-between" style="padding:.4rem 0;border-bottom:1px solid rgba(255,255,255,.03)"><span class="badge badge-t${t}">Tier ${t}</span><span>${tiers[t]} lig</span></div>`).join('')}</div>
        <div class="card"><h2>Rozkład ocen</h2>
          <div class="flex-between"><span>Średnia</span><span style="font-weight:800;color:var(--primary-light)">${ratingStats.avg_rating}</span></div>
          <div class="flex-between"><span>Min</span><span style="color:var(--red)">${ratingStats.min_rating}</span></div>
          <div class="flex-between"><span>Max</span><span style="color:var(--yellow)">${ratingStats.max_rating}</span></div>
          <div class="progress-bar"><div class="fill" style="width:${((ratingStats.avg_rating-25)/55)*100}%"></div></div>
          <div class="flex" style="margin-top:.8rem">
            <span class="stat-chip bad">${ratingStats.range_under_40}&lt;40</span>
            <span class="stat-chip mid">${ratingStats.range_40_60} 40-60</span>
            <span class="stat-chip good">${ratingStats.range_60_80} 60+</span>
          </div>
        </div>
      </div>
      <div class="card"><h2>Konfiguracja ocen</h2>
        <div class="grid-3" style="font-size:.85rem">
          <div><strong>Min OVR:</strong> ${config.min_ovr}</div>
          <div><strong>Max OVR:</strong> ${config.max_ovr}</div>
          <div><strong>Percentyle:</strong> ${config.value_percentile_min}-${config.value_percentile_max}</div>
          <div><strong>Bonus exp:</strong> max ${config.experience_max_bonus}</div>
          <div><strong>Bonus pot:</strong> max ${config.potential_max_bonus}</div>
          <div><strong>Override'y:</strong> ${Object.keys(config.overrides||{}).length}</div>
        </div>
      </div>`;
    document.getElementById('statusBadge').textContent = '✅ Gotowe';
  } catch(e) {
    el.innerHTML = `<div class="card" style="text-align:center;padding:3rem"><div style="font-size:2rem;margin-bottom:1rem">⚠️</div><h2>Błąd</h2><p style="color:var(--muted)">${e.message}</p><button class="btn" onclick="renderDashboard()">Odśwież</button></div>`;
  }
}

// === LEAGUES ===
async function renderLeagueList() {
  const el = document.getElementById('tab-leagues');
  if (!state.leagues) {
    try { const data = await api('/api/admin/leagues'); state.leagues = data.leagues; }
    catch(e) { el.innerHTML = `<div class="empty-state">Błąd: ${e.message}</div>`; return; }
  }
  el.innerHTML = `
    <div class="sidebar-layout">
      <div class="sidebar">
        <div class="card">
          <div class="flex-between"><h3>🏆 Ligi</h3><button class="btn btn-sm btn-green" onclick="showAddLeague()">+ Dodaj</button></div>
          <div class="search-box"><input type="text" placeholder="Szukaj ligi..." oninput="filterLeagues(this.value)"></div>
          <div id="addLeagueForm" class="hidden" style="padding:.5rem;background:rgba(16,185,129,.05);border:1px solid rgba(16,185,129,.2);border-radius:8px;margin-bottom:.5rem">
            <div class="form-inline">
              <div><label>Kod</label><input id="newLeagueCode" placeholder="np. PL2"></div>
              <div><label>Nazwa</label><input id="newLeagueName" placeholder="2. Liga"></div>
            </div>
            <div class="form-inline">
              <div><label>Tier (1-4)</label><select id="newLeagueTier"><option value="1">1 — Top</option><option value="2">2 — Średnia</option><option value="3" selected>3 — Niższa</option><option value="4">4 — Krajowa</option></select></div>
              <div><label>Poziom</label><select id="newLeagueLevel"><option value="1">1 — Ekstraklasa</option><option value="2">2 — 1. Liga</option><option value="3">3 — 2. Liga</option><option value="4">4 — 3. Liga</option></select></div>
            </div>
            <div class="flex" style="justify-content:end;margin-top:.4rem">
              <button class="btn btn-sm btn-ghost" onclick="document.getElementById('addLeagueForm').classList.add('hidden')">Anuluj</button>
              <button class="btn btn-sm btn-green" onclick="addLeague()">💾 Zapisz</button>
            </div>
          </div>
          <div id="leagueList" style="max-height:65vh;overflow-y:auto;padding-right:.4rem">
            ${state.leagues.map(l => leagueListItem(l)).join('')}
          </div>
        </div>
      </div>
      <div id="leagueDetail"><div class="empty-state">Wybierz ligę z listy</div></div>
    </div>`;
}

function leagueListItem(l) {
  const active = state.selectedLeague === l.code;
  const tierClass = `badge-t${l.tier || 4}`;
  const levelClass = `badge-l${Math.min(l.level || 1, 4)}`;
  return `<div class="league-item" data-name="${(l.name+'').toLowerCase()}" data-code="${l.code}" style="padding:.4rem .4rem;border-bottom:1px solid rgba(255,255,255,.03);cursor:pointer;border-radius:6px;${active ? 'background:rgba(37,99,235,.15)' : ''}" onclick="selectLeague('${l.code}')">
    <div class="flex-between">
      <div class="tier-row">
        <span class="badge ${tierClass}" title="Tier">T${l.tier||4}</span>
        <span class="badge ${levelClass}" title="Poziom">Lv${l.level||1}</span>
        <span style="font-weight:600;font-size:.9rem">${l.name}</span>
        ${l.is_extra ? '<span style="font-size:.6rem;color:var(--accent-cyan);font-weight:700">+</span>' : ''}
      </div>
      <div class="flex" style="gap:.25rem">
        <span style="color:var(--muted);font-size:.75rem">${l.club_count}</span>
        <button class="btn btn-sm btn-ghost" style="padding:.15rem .4rem;min-height:24px;font-size:.7rem" onclick="event.stopPropagation();editLeagueMeta('${l.code}')" title="Edytuj tier/poziom">✎</button>
        <button class="btn btn-sm btn-red" style="padding:.15rem .4rem;min-height:24px;font-size:.7rem" onclick="event.stopPropagation();deleteLeague('${l.code}')" title="Usuń ligę">✕</button>
      </div>
    </div>
  </div>`;
}

function filterLeagues(val) {
  const q = val.toLowerCase();
  document.querySelectorAll('.league-item').forEach(el => {
    el.style.display = el.dataset.name.includes(q) ? '' : 'none';
  });
}

function showAddLeague() {
  document.getElementById('addLeagueForm').classList.remove('hidden');
  document.getElementById('addLeagueForm').scrollIntoView({behavior:'smooth'});
}

async function addLeague() {
  const code = document.getElementById('newLeagueCode').value.trim().toUpperCase();
  const name = document.getElementById('newLeagueName').value.trim() || code;
  const tier = parseInt(document.getElementById('newLeagueTier').value);
  const level = parseInt(document.getElementById('newLeagueLevel').value);
  if (!code) { toast('Podaj kod ligi', true); return; }
  try {
    await api('/api/admin/league', {method:'POST', body: JSON.stringify({code, name, tier, level})});
    state.leagues = null;
    toast('Dodano ligę ' + name);
    renderLeagueList();
  } catch(e) { toast('Błąd: ' + e.message, true); }
}

async function editLeagueMeta(code) {
  try {
    const data = await api(`/api/admin/league/${code}`);
    const el = document.getElementById('confirmContent');
    el.innerHTML = `
      <h3 style="margin-bottom:.8rem">Edytuj: ${data.name}</h3>
      <div class="form-inline">
        <div><label>Nazwa</label><input id="editLeagueName" value="${data.name}"></div>
        <div><label>Kod</label><input id="editLeagueCode" value="${code}" disabled style="opacity:.6"></div>
      </div>
      <div class="form-inline">
        <div><label>Tier (siła ligi 1-4)</label>
          <select id="editLeagueTier">${[1,2,3,4].map(t => `<option value="${t}" ${t === data.tier ? 'selected' : ''}>${t}</option>`).join('')}</select>
        </div>
        <div><label>Poziom rozgrywek</label>
          <select id="editLeagueLevel">${[1,2,3,4,5].map(l => `<option value="${l}" ${l === (data.level||1) ? 'selected' : ''}>${l} — ${['','Ekstraklasa','1. Liga','2. Liga','3. Liga','4. Liga'][l]||'Lv'+l}</option>`).join('')}</select>
        </div>
      </div>
      <div class="form-inline">
        <div><label>Etykieta (label)</label><input id="editLeagueLabel" value="${data.label||data.name}"></div>
      </div>
      <div class="flex" style="justify-content:end;margin-top:1rem">
        <button class="btn btn-ghost" onclick="closeConfirm()">Anuluj</button>
        <button class="btn" onclick="saveLeagueMeta('${code}')">💾 Zapisz</button>
      </div>`;
    document.getElementById('confirmModal').classList.add('active');
  } catch(e) { toast('Błąd: ' + e.message, true); }
}

async function saveLeagueMeta(code) {
  const tier = parseInt(document.getElementById('editLeagueTier').value);
  const level = parseInt(document.getElementById('editLeagueLevel').value);
  const label = document.getElementById('editLeagueLabel').value.trim();
  const name = document.getElementById('editLeagueName').value.trim();
  try {
    const body = {tier, level, label};
    if (name) body.name = name;
    await api(`/api/admin/league/${code}`, {method:'PUT', body: JSON.stringify(body)});
    state.leagues = null;
    closeConfirm();
    toast('Zapisano');
    if (state.selectedLeague === code) selectLeague(code);
    else renderLeagueList();
  } catch(e) { toast('Błąd: ' + e.message, true); }
}

async function deleteLeague(code) {
  confirmDialog(`Usunąć ligę <strong>${code}</strong>? Ligę można później przywrócić w konfiguracji.`, async () => {
    try {
      await api(`/api/admin/league/${code}`, {method:'DELETE'});
      state.leagues = null;
      if (state.selectedLeague === code) { state.selectedLeague = null; }
      toast('Usunięto');
      renderLeagueList();
    } catch(e) { toast('Błąd: ' + e.message, true); }
  });
}

async function selectLeague(code) {
  state.selectedLeague = code;
  state.selectedClub = null;
  document.querySelectorAll('.league-item').forEach(el => {
    el.style.background = el.dataset.code === code ? 'rgba(37,99,235,.15)' : '';
  });
  const el = document.getElementById('leagueDetail');
  try {
    const data = await api(`/api/admin/league/${code}`);
    leagueCache[code] = data;
    el.innerHTML = `
      <div class="card">
        <div class="flex-between">
          <div>
            <h2 style="margin:0">${data.name} <span class="badge badge-t${data.tier||4}">Tier ${data.tier||4}</span> <span class="badge badge-l${Math.min(data.level||1,4)}">Poziom ${data.level||1}</span></h2>
            <div style="color:var(--muted);font-size:.82rem">${data.clubs.length} klubów • ${data.total_players} piłkarzy</div>
          </div>
          <div class="flex">
            <button class="btn btn-sm" onclick="editLeagueMeta('${code}')">✎ Edytuj</button>
            <button class="btn btn-sm btn-green" onclick="showAddClub('${code}')">+ Klub</button>
          </div>
        </div>
      </div>
      <div id="addClubForm_${code}" class="hidden" style="padding:.8rem;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:1rem">
        <h3 style="margin-bottom:.5rem;font-size:.95rem">Dodaj klub do ${data.name}</h3>
        <div class="form-inline">
          <div><label>Nazwa klubu</label><input id="newClubName" placeholder="np. FC Nowy"></div>
          <div><label>Kolor (hex)</label><input id="newClubColor" value="#3b82f6" placeholder="#3b82f6"></div>
        </div>
        <div class="flex" style="justify-content:end;margin-top:.4rem">
          <button class="btn btn-sm btn-ghost" onclick="document.getElementById('addClubForm_${code}').classList.add('hidden')">Anuluj</button>
          <button class="btn btn-sm btn-green" onclick="addClub('${code}')">💾 Zapisz</button>
        </div>
      </div>
      <div class="card" style="padding:0;overflow:hidden">
        <div style="padding:.8rem 1rem;border-bottom:1px solid var(--border);font-weight:700;font-size:.82rem;color:var(--muted);text-transform:uppercase">Kluby</div>
        <div style="overflow-x:auto">
          <table><thead><tr><th>Nazwa</th><th>Śr. ocena</th><th>Budżet</th><th>Kadra</th><th></th></tr></thead>
          <tbody>
            ${data.clubs.map(c => `
              <tr class="clickable" onclick="selectClub('${c.club_id}','${code}')">
                <td><div class="flex"><div style="width:28px;height:28px;border-radius:50%;background:${c.color};flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:900;color:#fff">${(c.name||'?')[0]}</div> <span style="font-weight:600">${c.name}</span></div></td>
                <td><span class="stat-chip ${c.avg_rating >= 60 ? 'good' : c.avg_rating >= 45 ? 'mid' : 'bad'}">${c.avg_rating}</span></td>
                <td>€${c.budget_millions}M</td>
                <td>${c.squad_size}</td>
                <td><div class="flex" style="gap:.25rem">
                  <button class="btn btn-sm btn-ghost" style="padding:.15rem .4rem;min-height:24px;font-size:.7rem" onclick="event.stopPropagation();selectClub('${c.club_id}','${code}')">✎</button>
                  <button class="btn btn-sm btn-red" style="padding:.15rem .4rem;min-height:24px;font-size:.7rem" onclick="event.stopPropagation();deleteClub('${c.club_id}','${code}')">✕</button>
                </div></td>
              </tr>`).join('')}
            ${data.clubs.length === 0 ? '<tr><td colspan="5" class="empty-state">Brak klubów</td></tr>' : ''}
          </tbody></table>
        </div>
      </div>`;
  } catch(e) {
    el.innerHTML = `<div class="card"><p style="color:var(--red)">Błąd: ${e.message}</p></div>`;
  }
}

function showAddClub(code) {
  const el = document.getElementById('addClubForm_' + code);
  if (el) el.classList.remove('hidden');
}

async function addClub(leagueCode) {
  const name = document.getElementById('newClubName').value.trim();
  const color = document.getElementById('newClubColor').value.trim() || '#3b82f6';
  if (!name) { toast('Podaj nazwę klubu', true); return; }
  try {
    await api('/api/admin/club', {method:'PUT', body: JSON.stringify({league_code: leagueCode, name, color})});
    toast('Dodano klub');
    selectLeague(leagueCode);
  } catch(e) { toast('Błąd: ' + e.message, true); }
}

async function deleteClub(clubId, leagueCode) {
  confirmDialog(`Usunąć ten klub?`, async () => {
    try {
      await api(`/api/admin/club/${clubId}`, {method:'DELETE'});
      toast('Usunięto klub');
      selectLeague(leagueCode);
    } catch(e) { toast('Błąd: ' + e.message, true); }
  });
}

async function selectClub(clubId, leagueCode) {
  state.selectedClub = clubId;
  const el = document.getElementById('leagueDetail');
  try {
    const data = await api(`/api/admin/club/${clubId}`);
    el.innerHTML = `
      <div class="card">
        <div class="flex-between">
          <div class="flex">
            <div style="width:36px;height:36px;border-radius:50%;background:${data.color};flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:900;color:#fff">${(data.name||'?')[0]}</div>
            <div><h2 style="margin:0">${data.name}</h2><div style="color:var(--muted);font-size:.82rem">€${data.budget_millions}M budżet • ${data.squad_size} zawodników • śr. ${data.avg_rating}</div></div>
          </div>
          <button class="btn btn-sm btn-ghost" onclick="selectLeague('${leagueCode}')">← Powrót</button>
        </div>
      </div>
      ${!data.players || data.players.length === 0 ? '<div class="card"><p class="empty-state">Brak zawodników (klub dodany ręcznie)</p></div>' : `
      <div class="card" style="padding:0;overflow:hidden">
        <div style="padding:.8rem 1rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem">
          <span style="font-weight:700;font-size:.82rem;color:var(--muted);text-transform:uppercase">Zawodnicy (${data.players.length})</span>
          <div class="flex">
            <input type="text" placeholder="Szukaj..." style="width:160px" id="playerSearch" oninput="filterPlayers()">
            <select id="posFilter" onchange="filterPlayers()" style="width:90px">
              <option value="">All</option><option value="BR">BR</option><option value="OB">OB</option><option value="PO">PO</option><option value="NA">NA</option>
            </select>
          </div>
        </div>
        <div style="overflow-x:auto">
          <table id="playerTable"><thead><tr><th>#</th><th>Nazwisko</th><th>Wiek</th><th>Pozycja</th><th>Wartość</th><th>Ocena</th><th>Base</th><th>Exp</th><th>Pot</th><th></th></tr></thead>
          <tbody>
            ${data.players.map((p,i) => playerRow(p,i+1)).join('')}
          </tbody></table>
        </div>
      </div>`}`;
  } catch(e) {
    el.innerHTML = `<div class="card"><p style="color:var(--red)">Błąd: ${e.message}</p></div>`;
  }
}

function playerRow(p, idx) {
  const posClass = {BR:'pos-brd',OB:'pos-ob',PO:'pos-po',NA:'pos-na'}[p.position]||'';
  return `<tr data-player-id="${p.player_id}" data-rating="${p.rating}">
    <td style="color:var(--muted)">${idx}</td>
    <td><span style="font-weight:600">${p.name}</span></td><td>${p.age ?? '-'}</td>
    <td><span class="pos-badge ${posClass}">${p.position}</span></td>
    <td>${p.market_value||'—'}</td>
    <td><input class="ovr" type="number" min="25" max="80" value="${p.rating}" data-field="rating" data-pid="${p.player_id}" onchange="updatePlayerField('${p.player_id}','rating',this.value)" style="background:${ratingColor(p.rating)}"></td>
    <td><input class="ovr" type="number" min="20" max="75" value="${p.rating_base}" data-field="rating_base" data-pid="${p.player_id}" onchange="updatePlayerField('${p.player_id}','rating_base',this.value)"></td>
    <td><input class="ovr" type="number" min="0" max="5" value="${p.rating_experience}" data-field="rating_experience" data-pid="${p.player_id}" onchange="updatePlayerField('${p.player_id}','rating_experience',this.value)"></td>
    <td><input class="ovr" type="number" min="0" max="5" value="${p.rating_potential}" data-field="rating_potential" data-pid="${p.player_id}" onchange="updatePlayerField('${p.player_id}','rating_potential',this.value)"></td>
    <td><button class="btn btn-sm btn-red" onclick="resetPlayer('${p.player_id}')" title="Reset">↺</button></td>
  </tr>`;
}

function ratingColor(r) {
  if (r >= 70) return 'rgba(16,185,129,.2)';
  if (r >= 55) return 'rgba(251,191,36,.15)';
  return 'rgba(239,68,68,.12)';
}

function filterPlayers() {
  const q = document.getElementById('playerSearch')?.value.toLowerCase() || '';
  const pos = document.getElementById('posFilter')?.value || '';
  document.querySelectorAll('#playerTable tbody tr').forEach(tr => {
    const name = (tr.querySelector('td:nth-child(2)')?.textContent||'').toLowerCase();
    const posTd = tr.querySelector('.pos-badge')?.textContent || '';
    tr.style.display = name.includes(q) && (!pos || posTd === pos) ? '' : 'none';
  });
}

async function updatePlayerField(pid, field, value) {
  const payload = {};
  payload[field] = parseInt(value) || 0;
  try {
    await api(`/api/admin/player/${pid}`, {method:'PUT', body: JSON.stringify(payload)});
    const input = document.querySelector(`input[data-pid="${pid}"][data-field="${field}"]`);
    if (input) input.style.background = ratingColor(parseInt(value));
    toast('Zapisano');
  } catch(e) { toast('Błąd: ' + e.message, true); }
}

async function resetPlayer(pid) {
  try {
    const data = await api(`/api/admin/player/${pid}/reset`, {method:'POST'});
    const row = document.querySelector(`tr[data-player-id="${pid}"]`);
    if (row) {
      row.querySelectorAll('input.ovr').forEach(inp => {
        const f = inp.dataset.field;
        if (data[f] !== undefined) inp.value = data[f];
        inp.style.background = ratingColor(data.rating);
      });
    }
    toast('Zresetowano');
  } catch(e) { toast('Błąd: ' + e.message, true); }
}

// === CONFIG ===
async function renderConfig() {
  const el = document.getElementById('tab-config');
  try {
    const config = await api('/api/admin/config');
    state.config = config;
    el.innerHTML = `
      <div class="grid-2">
        <div class="card"><h2>Konfiguracja ocen</h2>
          <div class="panel-section"><label>Min OVR</label><input type="number" id="cfg-min_ovr" value="${config.min_ovr}" min="10" max="50"></div>
          <div class="panel-section"><label>Max OVR</label><input type="number" id="cfg-max_ovr" value="${config.max_ovr}" min="50" max="99"></div>
          <div class="panel-section"><label>Percentyl min</label><input type="number" id="cfg-value_percentile_min" value="${config.value_percentile_min}" min="10" max="60"></div>
          <div class="panel-section"><label>Percentyl max</label><input type="number" id="cfg-value_percentile_max" value="${config.value_percentile_max}" min="40" max="90"></div>
          <div class="grid-2">
            <div class="panel-section"><label>Max bonus exp</label><input type="number" id="cfg-experience_max_bonus" value="${config.experience_max_bonus}" min="0" max="10"></div>
            <div class="panel-section"><label>Max bonus pot</label><input type="number" id="cfg-potential_max_bonus" value="${config.potential_max_bonus}" min="0" max="10"></div>
          </div>
          <div class="panel-section"><label>Override'y (JSON)</label><textarea id="cfg-overrides" rows="4" style="width:100%;background:#0b0f1a;border:1px solid var(--border);color:#fff;border-radius:6px;padding:.5rem;font-family:monospace;font-size:.82rem">${JSON.stringify(config.overrides||{}, null, 2)}</textarea></div>
          <div class="flex" style="margin-top:1rem">
            <button class="btn" onclick="saveConfig()">💾 Zapisz</button>
            <button class="btn btn-green" onclick="rebuildDB()">🔄 Przebuduj</button>
          </div>
        </div>
        <div class="card"><h2>Podgląd</h2>
          <div class="panel-section"><label>Base rating</label><div style="font-weight:800;font-size:1.2rem">${config.value_percentile_min} — ${config.value_percentile_max}</div><div class="progress-bar"><div class="fill" style="width:${((config.value_percentile_max-config.value_percentile_min)/70)*100}%"></div></div></div>
          <div class="panel-section"><label>Final rating</label><div style="font-weight:800;font-size:1.2rem">${config.min_ovr} — ${config.max_ovr}</div><div class="progress-bar"><div class="fill" style="width:${((config.max_ovr-config.min_ovr)/70)*100}%"></div></div></div>
          <div class="panel-section" style="margin-top:1rem"><label>Dostępne ligi z tierami</label>
            <div id="leagueTierPreview" style="max-height:300px;overflow-y:auto;font-size:.85rem">
              ${(state.leagues||[]).map(l => `<div class="flex-between" style="padding:.3rem 0;border-bottom:1px solid rgba(255,255,255,.03)"><span class="badge badge-t${l.tier||4}">T${l.tier||4}</span><span class="badge badge-l${Math.min(l.level||1,4)}">Lv${l.level||1}</span><span>${l.name}</span><span style="color:var(--muted)">€${l.avg_budget||'?'}M</span></div>`).join('')}
            </div>
          </div>
        </div>
      </div>`;
  } catch(e) { el.innerHTML = `<div class="card"><p style="color:var(--red)">Błąd: ${e.message}</p></div>`; }
}

async function saveConfig() {
  const config = {
    min_ovr: parseInt(document.getElementById('cfg-min_ovr').value)||25,
    max_ovr: parseInt(document.getElementById('cfg-max_ovr').value)||80,
    value_percentile_min: parseInt(document.getElementById('cfg-value_percentile_min').value)||25,
    value_percentile_max: parseInt(document.getElementById('cfg-value_percentile_max').value)||75,
    experience_max_bonus: parseInt(document.getElementById('cfg-experience_max_bonus').value)||3,
    potential_max_bonus: parseInt(document.getElementById('cfg-potential_max_bonus').value)||3,
    overrides: {}
  };
  try { config.overrides = JSON.parse(document.getElementById('cfg-overrides').value); }
  catch(e) { toast('Nieprawidłowy JSON', true); return; }
  try { await api('/api/admin/config', {method:'PUT', body: JSON.stringify(config)}); state.config = config; toast('Zapisano'); }
  catch(e) { toast('Błąd: ' + e.message, true); }
}

async function rebuildDB() {
  if (!confirm('Przebudować bazę? To zajmie chwilę.')) return;
  try { const r = await api('/api/admin/rebuild', {method:'POST'}); state.leagues = null; toast(`Baza: ${r.total_players} piłkarzy, śr. ${r.avg_rating}`); showTab('dashboard'); }
  catch(e) { toast('Błąd: ' + e.message, true); }
}

// === BULK ===
function renderBulk() {
  const el = document.getElementById('tab-bulk');
  el.innerHTML = `
    <div class="grid-2">
      <div class="card"><h2>Masowe obniżenie</h2>
        <p style="color:var(--muted);font-size:.85rem;margin-bottom:1rem">Odejmij punkty od ocen.</p>
        <div class="panel-section"><label>Odejmij</label><input type="number" id="bulk-subtract" value="3" min="1" max="30"></div>
        <div class="panel-section"><label>Pozycja</label><select id="bulk-position"><option value="">Wszystkie</option><option value="BR">BR</option><option value="OB">OB</option><option value="PO">PO</option><option value="NA">NA</option></select></div>
        <div class="panel-section"><label>Liga</label><select id="bulk-league"><option value="">Wszystkie</option>${(state.leagues||[]).map(l => `<option value="${l.code}">${l.name}</option>`).join('')}</select></div>
        <button class="btn btn-red" onclick="bulkSubtract()">⬇ Zastosuj</button>
      </div>
      <div class="card"><h2>Ustaw stałą ocenę</h2>
        <p style="color:var(--muted);font-size:.85rem;margin-bottom:1rem">Ustaw wszystkim tę samą ocenę.</p>
        <div class="panel-section"><label>Nowa ocena</label><input type="number" id="bulk-set-value" value="50" min="25" max="80"></div>
        <div class="panel-section"><label>Pozycja</label><select id="bulk-set-position"><option value="">Wszystkie</option><option value="BR">BR</option><option value="OB">OB</option><option value="PO">PO</option><option value="NA">NA</option></select></div>
        <button class="btn btn-green" onclick="bulkSet()">🎯 Ustaw</button>
      </div>
    </div>
    <div class="card"><h2>Korekta procentowa</h2>
      <p style="color:var(--muted);font-size:.85rem;margin-bottom:1rem">Zmiana procentowa (np. -20 obniży ocenę 70 do 56).</p>
      <div class="flex" style="align-items:end"><div class="panel-section" style="flex:1"><label>Procent</label><input type="number" id="bulk-pct" value="-20" min="-80" max="80"></div><button class="btn btn-red" onclick="bulkPercent()">% Zastosuj</button></div>
    </div>`;
}

async function bulkSubtract() {
  const val = parseInt(document.getElementById('bulk-subtract').value)||3;
  const position = document.getElementById('bulk-position').value;
  const league = document.getElementById('bulk-league').value;
  if (!confirm(`Obniżyć o ${val}pkt${position ? ' ('+position+')' : ''}${league ? ' ('+league+')' : ''}?`)) return;
  try { const r = await api('/api/admin/bulk/subtract', {method:'POST', body: JSON.stringify({value:val,position,league})}); toast(`Zmieniono ${r.updated} piłkarzy`); }
  catch(e) { toast('Błąd: ' + e.message, true); }
}
async function bulkSet() {
  const val = parseInt(document.getElementById('bulk-set-value').value)||50;
  const position = document.getElementById('bulk-set-position').value;
  if (!confirm(`Ustawić ${val}${position ? ' ('+position+')' : ''}?`)) return;
  try { const r = await api('/api/admin/bulk/set', {method:'POST', body: JSON.stringify({value:val,position})}); toast(`Zmieniono ${r.updated} piłkarzy`); }
  catch(e) { toast('Błąd: ' + e.message, true); }
}
async function bulkPercent() {
  const pct = parseInt(document.getElementById('bulk-pct').value)||-20;
  if (!confirm(`Zastosować ${pct}%?`)) return;
  try { const r = await api('/api/admin/bulk/percent', {method:'POST', body: JSON.stringify({percent:pct})}); toast(`Zmieniono ${r.updated} piłkarzy`); }
  catch(e) { toast('Błąd: ' + e.message, true); }
}

// === INIT ===
showTab('dashboard');
</script>
</body>
</html>
